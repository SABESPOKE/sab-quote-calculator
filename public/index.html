<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SAB Quote Studio</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#c8a96e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f5f5f5; }
    #root { min-height: 100vh; }

    /* Mobile bottom tab bar */
    .sab-mobile-tabs { display:none; }

    /* ── Prevent horizontal overflow globally ── */
    html, body { overflow-x: hidden; max-width: 100%; }

    /* ── iOS input zoom prevention (always active) ── */
    input, select, textarea { font-size: 16px; }

    @media (max-width: 767px) {
      /* ══════════════════════════════════════════════
         GLOBAL TEXT & TOUCH TARGET OVERRIDES
         Override inline React styles with !important
         ══════════════════════════════════════════════ */

      /* Base font sizing */
      body { font-size: 16px !important; line-height: 1.6 !important; }

      /* All buttons: minimum 44px touch targets */
      button {
        min-height: 44px !important;
        font-size: 13px !important;
        padding: 10px 14px !important;
      }

      /* All inputs, selects, textareas: comfortable size + prevent iOS zoom */
      input, select, textarea {
        min-height: 44px !important;
        font-size: 16px !important;
        padding: 10px 12px !important;
        border-radius: 6px !important;
      }

      /* Labels: readable size */
      label {
        font-size: 12px !important;
        margin-bottom: 6px !important;
      }

      /* Small divs used as section headers — React renders fontSize:9 as font-size: 9px */
      div[style*="font-size: 8px"],
      div[style*="font-size:8px"] {
        font-size: 11px !important;
      }
      div[style*="font-size: 9px"],
      div[style*="font-size:9px"] {
        font-size: 12px !important;
      }
      div[style*="font-size: 10px"],
      div[style*="font-size:10px"] {
        font-size: 13px !important;
      }
      div[style*="font-size: 11px"],
      div[style*="font-size:11px"] {
        font-size: 13px !important;
      }
      div[style*="font-size: 12px"],
      div[style*="font-size:12px"] {
        font-size: 14px !important;
      }

      /* Table cells: readable */
      td, th {
        font-size: 13px !important;
        padding: 10px 8px !important;
      }

      /* Spans used for small text */
      span[style*="font-size: 8px"],
      span[style*="font-size:8px"] {
        font-size: 11px !important;
      }
      span[style*="font-size: 9px"],
      span[style*="font-size:9px"] {
        font-size: 12px !important;
      }
      span[style*="font-size: 10px"],
      span[style*="font-size:10px"] {
        font-size: 13px !important;
      }
      span[style*="font-size: 11px"],
      span[style*="font-size:11px"] {
        font-size: 13px !important;
      }

      /* ══════════════════════════════
         HEADER
         ══════════════════════════════ */
      .sab-header { height:56px !important; padding:0 12px !important; }
      .sab-header-brand { gap:10px !important; }
      .sab-header-brand .sab-brand-text { display:none !important; }
      .sab-header-brand .sab-brand-divider { display:none !important; }
      .sab-header-brand img { width:40px !important; height:40px !important; }
      .sab-header-nav { gap:2px !important; overflow-x:auto; -webkit-overflow-scrolling:touch; flex-shrink:1; min-width:0; }
      .sab-header-nav button {
        padding: 8px 10px !important;
        font-size: 11px !important;
        white-space: nowrap;
        min-height: 40px !important;
      }

      /* ══════════════════════════════
         QUOTES LIST VIEW
         ══════════════════════════════ */
      .sab-quotes-list { padding:20px 16px !important; max-width: 100% !important; }
      .sab-quotes-list > div:first-child {
        flex-direction: column !important;
        gap: 12px !important;
        align-items: flex-start !important;
      }
      /* Quote cards */
      .sab-quotes-list > div > div[style*="cursor"] {
        padding: 16px !important;
      }
      .sab-quotes-list button {
        min-height: 44px !important;
        font-size: 13px !important;
        padding: 12px 18px !important;
      }

      /* ══════════════════════════════
         BUILD VIEW - 3 panel to tabbed
         ══════════════════════════════ */
      .sab-build-layout { flex-direction:column !important; height:calc(100vh - 56px - 52px) !important; }
      .sab-rooms-panel {
        display:none !important;
        width:100% !important;
        border-right:none !important;
        border-bottom:1px solid #d8d3cc;
        max-height:100%;
        overflow-y:auto;
        padding: 14px 0 !important;
      }
      .sab-rooms-panel.active { display:flex !important; }
      .sab-rooms-panel input {
        font-size: 14px !important;
        min-height: 44px !important;
      }
      /* Room list items */
      .sab-rooms-panel > div > div[style*="cursor"] {
        min-height: 48px !important;
        padding: 10px 14px !important;
      }
      .sab-rooms-panel button {
        min-height: 40px !important;
        min-width: 40px !important;
        font-size: 13px !important;
      }

      .sab-items-panel {
        display:none !important;
        width:100% !important;
        padding: 16px 14px !important;
      }
      .sab-items-panel.active { display:block !important; }

      .sab-chat-panel {
        display:none !important;
        width:100% !important;
        border-left:none !important;
        border-top:1px solid #d8d3cc;
      }
      .sab-chat-panel.active { display:flex !important; }
      /* Chat messages: readable */
      .sab-chat-panel div[style*="border-radius: 8px"] {
        font-size: 14px !important;
        padding: 12px 16px !important;
      }
      /* Chat input */
      .sab-chat-panel input {
        font-size: 16px !important;
        min-height: 44px !important;
        padding: 10px 14px !important;
      }
      .sab-chat-panel button {
        min-height: 44px !important;
        min-width: 44px !important;
        font-size: 16px !important;
      }

      /* ══════════════════════════════
         BOTTOM TAB BAR
         ══════════════════════════════ */
      .sab-mobile-tabs {
        display:flex !important;
        position:fixed;
        bottom:0; left:0; right:0;
        height: 56px;
        background:#1a1a1a;
        border-top:1px solid #c8a96e33;
        z-index:999;
      }
      .sab-mobile-tabs button {
        flex:1;
        background:transparent;
        border:none;
        color:#777777;
        font-size: 11px !important;
        font-family:inherit;
        letter-spacing:0.08em;
        text-transform:uppercase;
        cursor:pointer;
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:center;
        gap: 3px;
        min-height: 56px !important;
        padding: 6px 4px !important;
      }
      .sab-mobile-tabs button.active { color:#c8a96e; }
      .sab-mobile-tabs button .tab-icon { font-size: 20px !important; }

      /* ══════════════════════════════
         ADD ITEM MODAL
         ══════════════════════════════ */
      .sab-add-modal {
        width: calc(100vw - 16px) !important;
        max-width: 100% !important;
        padding: 18px 14px !important;
        max-height: 88vh !important;
        border-radius: 8px !important;
      }
      .sab-add-modal .sab-type-tabs {
        flex-wrap: wrap !important;
        gap: 6px !important;
      }
      .sab-add-modal .sab-type-tabs button {
        padding: 10px 14px !important;
        font-size: 12px !important;
        min-height: 40px !important;
      }
      .sab-add-grid { grid-template-columns: 1fr !important; }

      /* Modal 2-column grids → single column */
      .sab-add-modal div[style*="grid-template-columns: 1fr 1fr"] {
        grid-template-columns: 1fr !important;
      }

      /* Modal section headers */
      .sab-add-modal div[style*="letter-spacing: 0.1em"] {
        font-size: 12px !important;
        margin-bottom: 8px !important;
      }

      /* Modal labels */
      .sab-add-modal label {
        font-size: 12px !important;
      }

      /* Modal inputs and selects */
      .sab-add-modal input,
      .sab-add-modal select {
        font-size: 16px !important;
        min-height: 44px !important;
        padding: 10px 12px !important;
      }

      /* Modal action buttons */
      .sab-add-modal > div:last-child button,
      .sab-add-modal div[style*="gap: 10px"] > button {
        min-height: 48px !important;
        font-size: 14px !important;
        padding: 14px 20px !important;
        border-radius: 6px !important;
      }

      /* Price preview in modal */
      .sab-add-modal div[style*="repeat(3"] {
        grid-template-columns: 1fr 1fr 1fr !important;
        gap: 8px !important;
      }
      .sab-add-modal div[style*="font-size: 15px"] {
        font-size: 16px !important;
      }

      /* ══════════════════════════════
         ROOM DEFAULTS GRID
         ══════════════════════════════ */
      .sab-room-defaults-grid {
        grid-template-columns: 1fr 1fr !important;
        gap: 10px !important;
      }
      .sab-room-defaults-grid select,
      .sab-room-defaults-grid input {
        font-size: 14px !important;
        min-height: 40px !important;
        padding: 8px 10px !important;
      }
      .sab-room-defaults-grid label {
        font-size: 11px !important;
      }

      /* ══════════════════════════════
         ITEMS TABLE
         ══════════════════════════════ */
      .sab-items-table .sab-col-whd,
      .sab-items-table .sab-col-cost { display:none !important; }

      /* Table action buttons (Edit, Dup, ×) */
      .sab-items-panel table button {
        min-height: 36px !important;
        min-width: 36px !important;
        font-size: 12px !important;
        padding: 6px 10px !important;
      }

      /* Items panel + Add Item button */
      .sab-items-panel > div:first-child button {
        min-height: 44px !important;
        font-size: 13px !important;
      }

      /* ══════════════════════════════
         PROJECT COSTS
         ══════════════════════════════ */
      .sab-project-costs-row {
        flex-direction: column !important;
        gap: 10px !important;
      }

      /* ══════════════════════════════
         MARGIN VIEW
         ══════════════════════════════ */
      div[style*="max-width: 920px"] {
        padding: 24px 16px !important;
        max-width: 100% !important;
      }
      /* Margin view: 4-col grids → 2-col */
      div[style*="repeat(4, 1fr)"] {
        grid-template-columns: 1fr 1fr !important;
        gap: 12px !important;
      }
      /* Margin view: 3-col grids */
      div[style*="repeat(3, 1fr)"] {
        grid-template-columns: 1fr 1fr 1fr !important;
        gap: 10px !important;
      }
      /* Margin room header: stack on mobile */
      div[style*="gap: 22px"] {
        gap: 10px !important;
        flex-wrap: wrap !important;
      }
      /* Margin item rows */
      div[style*="gap: 18px"] {
        gap: 8px !important;
        flex-wrap: wrap !important;
      }
      div[style*="gap: 18px"] span[style*="width: 80px"] {
        width: auto !important;
      }
      div[style*="gap: 18px"] span[style*="width: 40px"] {
        width: auto !important;
      }

      /* ══════════════════════════════
         CLIENT VIEW
         ══════════════════════════════ */
      div[style*="max-width: 740px"] {
        padding: 24px 16px !important;
        max-width: 100% !important;
      }
      /* Client view header: stack */
      div[style*="max-width: 740px"] > div:first-child {
        flex-direction: column !important;
        gap: 16px !important;
      }
      div[style*="max-width: 740px"] > div:first-child > div:last-child {
        text-align: left !important;
      }
      /* Client view filter buttons */
      div[style*="max-width: 740px"] div[style*="flex-wrap"] button {
        min-height: 40px !important;
        font-size: 12px !important;
        padding: 8px 14px !important;
      }

      /* ══════════════════════════════
         SETTINGS VIEW
         ══════════════════════════════ */
      div[style*="max-width: 960px"] {
        padding: 24px 16px !important;
        max-width: 100% !important;
        grid-template-columns: 1fr !important;
        gap: 20px !important;
      }

      /* ══════════════════════════════
         GENERAL MOBILE SPACING
         ══════════════════════════════ */
      /* Increase spacing between form field groups */
      .sab-add-modal > div[style*="margin-bottom: 14px"] {
        margin-bottom: 18px !important;
      }

      /* Ensure all containers with fixed widths become fluid */
      div[style*="width: 220px"] { width: 100% !important; }
      div[style*="width: 320px"] { width: 100% !important; }
      div[style*="width: 720px"] { width: calc(100vw - 16px) !important; }

      /* New quote form modal fields */
      .sab-quotes-list input {
        font-size: 16px !important;
        min-height: 44px !important;
        padding: 12px 14px !important;
      }

      /* Delete button in quote cards */
      .sab-quotes-list button[style*="font-size: 9px"] {
        font-size: 12px !important;
        min-height: 36px !important;
      }
    }

    /* ── Small phone adjustments ── */
    @media (max-width: 380px) {
      /* Margin/Client view grids: further collapse */
      div[style*="repeat(3, 1fr)"] {
        grid-template-columns: 1fr !important;
      }
      .sab-room-defaults-grid {
        grid-template-columns: 1fr !important;
      }
      .sab-header-nav button {
        padding: 6px 8px !important;
        font-size: 10px !important;
      }
    }
  </style>
</head>

  <div id="root"></div>

// ─── SAB LOGO — inline SVG component (works in all browsers, any size) ────────
// Monogram: two bezier-curve legs from a common apex, crossing in the lower
// portion (~y=113) to recreate the SAB stamp design. Upper oval brackets the
// A letterform; lower oval brackets the crossing. Gold on dark for app header.
function SABLogo({ size = 44, style = {} }) {
  return (
    <img
      src={SAB_LOGO_DARK}
      alt="SAB"
      width={size}
      height={size}
      style={{ display:"block", borderRadius:"50%", ...style }}
    />
  );
}

function hingeCount(doorHeightMm) {

function calcDesignTimePerRoom(roomData) {
  const s = DB.settings;
  const rounds = roomData?.designRounds ?? s.designRoundsPerRoom;
  const hrsPerRound = roomData?.designHrsPerRound ?? s.designHoursPerRound;
  const techDays = roomData?.techDays ?? s.technicalDrawingDays;
  const rate = roomData?.designRate ?? s.designHourlyRate;
  const totalHrs = rounds * hrsPerRound + techDays * s.workingHoursPerDay;
  const total = totalHrs * rate;
  return total;
}

// ─── PRICING ENGINE ───────────────────────────────────────────────────────────

// Spray finishing — full prep model: caulking + sanding between coats + spray per coat
// finishType: "paint" | "lacquer" | "stain_lacquer"
// surfaceType: "door" (2 faces + 4 edges) | "panel" (1 face)
function calcSprayFinishCost({ doorType, widthMm, heightMm, qty = 1, finishType = "paint", hasStain = false, surfaceType = "door" }) {
  const sf = DB.settings.sprayFinish;
  const dt = DB.doorTypes[doorType] || {};

  // Geometry
  const faceAreaM2  = (widthMm / 1000) * (heightMm / 1000);
  const faces       = surfaceType === "panel" ? 1 : 2;  // doors: front+back; panels: 1 face
  const sprayAreaM2 = faceAreaM2 * faces;
  const perimM      = 2 * (widthMm + heightMm) / 1000;  // 4-edge perimeter in metres

  // Shaker/framed quirk perimeter — inner frame groove
  const stileW      = dt.shakerStileWidthMm || 70;
  const innerW      = Math.max(0, widthMm  - 2 * stileW);
  const innerH      = Math.max(0, heightMm - 2 * stileW);
  const quirkM      = dt.hasQuirk ? (2 * (innerW + innerH) / 1000) : 0;

  let totalHrs = sf.setupMinsPerDoor / 60;
  let matCost  = 0;
  const bd     = { quirkM: +quirkM.toFixed(3), faceAreaM2: +sprayAreaM2.toFixed(4) };

  // Helper: hours to spray one coat (face + edges + quirk)
  const sprayCoatHrs = (fhrs, ehrs, qhrs) =>
    sprayAreaM2 * fhrs + perimM * ehrs + quirkM * qhrs;

  // Helper: hours to sand between coats
  const sandHrs = () =>
    sprayAreaM2 * sf.sandFaceHrsPerM2 + perimM * sf.sandEdgeHrsPerM + quirkM * sf.sandQuirkHrsPerM;

  // ── CAULKING (shaker/framed only — once before priming) ──────────────────
  if (quirkM > 0) {
    const ch = quirkM * sf.caulkHrsPerM;
    const cm = quirkM * sf.caulkCostPerM;
    totalHrs += ch;
    matCost  += cm;
    bd.caulkHrs = +ch.toFixed(3);
    bd.caulkMat = +cm.toFixed(2);
  }

  // ── STAIN (optional — brush/wipe before lacquer) ──────────────────────────
  if (hasStain || finishType === "stain_lacquer") {
    const st = sf.stain;
    // Apply stain: face + edges + quirk (brush/wipe, slower than spray)
    const sh = sprayAreaM2 * st.applyHrsPerM2 + perimM * st.edgeHrsPerM + quirkM * st.quirkHrsPerM;
    const sm = (sprayAreaM2 / st.coverageM2PerL) * st.costPerLitre;
    // Sand after stain dries (treat as one inter-coat sand)
    const ssh = sandHrs();
    totalHrs += sh + ssh;
    matCost  += sm;
    bd.stainHrs = +(sh + ssh).toFixed(3);
    bd.stainMat = +sm.toFixed(2);
  }

  // ── PAINT (opaque — primer + topcoats) ───────────────────────────────────
  if (finishType === "paint") {
    const p = sf.paint;
    const pHrsPerCoat  = sprayCoatHrs(p.primerSprayHrsPerM2, p.primerEdgeHrsPerM, p.primerQuirkHrsPerM);
    const pMatPerCoat  = (sprayAreaM2 / p.primerCoverageM2PerL) * p.primerCostPerLitre;
    // Primer coats: spray each coat, sand between each coat (including after last primer before first topcoat)
    const primerHrs = pHrsPerCoat * p.primerCoats + sandHrs() * p.primerCoats;
    const primerMat = pMatPerCoat * p.primerCoats;

    const tHrsPerCoat  = sprayCoatHrs(p.topCoatSprayHrsPerM2, p.topCoatEdgeHrsPerM, p.topCoatQuirkHrsPerM);
    const tMatPerCoat  = (sprayAreaM2 / p.topCoatCoverageM2PerL) * p.topCoatCostPerLitre;
    // Top coats: spray all, sand between all except after the final coat
    const topHrs = tHrsPerCoat * p.topCoats + sandHrs() * (p.topCoats - 1);
    const topMat = tMatPerCoat * p.topCoats;

    totalHrs += primerHrs + topHrs;
    matCost  += primerMat + topMat;
    bd.primerHrs = +primerHrs.toFixed(3);
    bd.topCoatHrs = +topHrs.toFixed(3);
    bd.primerMat = +primerMat.toFixed(2);
    bd.topCoatMat = +topMat.toFixed(2);
  }

  // ── LACQUER (clear — 2 coats, no primer) ─────────────────────────────────
  if (finishType === "lacquer" || finishType === "stain_lacquer") {
    const lq = sf.lacquer;
    const lHrsPerCoat = sprayCoatHrs(lq.sprayHrsPerM2, lq.edgeHrsPerM, lq.quirkHrsPerM);
    const lMatPerCoat = (sprayAreaM2 / lq.coverageM2PerL) * lq.costPerLitre;
    // Sand between coats except after final
    const lacHrs = lHrsPerCoat * lq.coats + sandHrs() * (lq.coats - 1);
    const lacMat = lMatPerCoat * lq.coats;
    totalHrs += lacHrs;
    matCost  += lacMat;
    bd.lacquerHrs = +lacHrs.toFixed(3);
    bd.lacquerMat = +lacMat.toFixed(2);
  }

  const labourCost  = totalHrs * sf.techLabourRate;
  const boothCost   = totalHrs * sf.boothCostPerHr;
  const costPerDoor = labourCost + boothCost + matCost;

  return {
    costPerDoor,
    total: costPerDoor * qty,
    breakdown: { ...bd, totalHrs: +totalHrs.toFixed(3), labourCost: +labourCost.toFixed(2), boothCost: +boothCost.toFixed(2), matCost: +matCost.toFixed(2) },
  };
}

function calcDoorCost({ doorType, widthMm, heightMm, qty = 1, hingeCost = 0, handleCost = 0, sprayFinish = true, hasStain = false }) {
  const dt = DB.doorTypes[doorType];
  if (!dt) return null;
  const area = (widthMm / 1000) * (heightMm / 1000);
  const materialCost = area * (dt.baseCostPerM2 + dt.finishCostPerM2);
  const labourHours = (area * dt.extraLabourPerM2) + (dt.baseLabourHrs || 0.75);
  const labourCost = labourHours * er();
  // Area-based spray finish: faces + edges + quirks (shaker profile), primer + topcoats separately
  const finishType       = DB.doorTypes[doorType]?.finishType || "paint";
  const sprayResult      = sprayFinish ? calcSprayFinishCost({ doorType, widthMm, heightMm, qty: 1, finishType, hasStain }) : null;
  const sprayFinishCost  = sprayResult ? sprayResult.costPerDoor : 0;
  const totalCostPerDoor = materialCost + labourCost + hingeCost + handleCost + sprayFinishCost;
  const sellExVAT = totalCostPerDoor * DB.settings.margin;
  return {
    costPerUnit: totalCostPerDoor,
    sellPerUnit: sellExVAT,
    totalCost: totalCostPerDoor * qty,
    totalSellExVAT: sellExVAT * qty,
    totalSellIncVAT: sellExVAT * qty * (1 + DB.settings.vat),
    breakdown: {
      materialCost, labourCost, hingeCost, handleCost, area, labourHours,
      sprayFinish: sprayFinishCost,
      sprayDetail: sprayResult ? sprayResult.breakdown : null,
    },
  };
}

function calcFrameCost({ species, heightMm, widthMm, labourHrs = 3, hardwareCost = 15, qty = 1 }) {
  const sp = DB.solidTimber[species];
  if (!sp) return null;
  const runningM = ((2 * heightMm + widthMm) / 1000) * 1.1;
  const sectionArea = 0.095 * 0.032;
  const volumeM3 = runningM * sectionArea;
  const materialCost = volumeM3 * sp.effectivePerM3;
  const labourCost = labourHrs * er();
  const totalCost = materialCost + labourCost + hardwareCost;
  const sellExVAT = totalCost * DB.settings.margin;
  return {
    costPerUnit: totalCost,
    sellPerUnit: sellExVAT,
    totalCost: totalCost * qty,
    totalSellExVAT: sellExVAT * qty,
    totalSellIncVAT: sellExVAT * qty * (1 + DB.settings.vat),
    breakdown: { materialCost, labourCost, hardwareCost, volumeM3, runningM },
  };
}

function calcDrawerCost({ drawerType, widthMm = 500, heightMm = 200, depthMm = 500, qty = 1, runnerCostOverride = null, carcassMaterialKey = null }) {
  const dt = DB.drawerTypes[drawerType];
  if (!dt) return null;
  let materialCost;
  if (dt.usesCarcassMaterial) {
    // Calculate from carcass sheet material: 2 sides + front + back + base
    const matKey = carcassMaterialKey || "MAT_BIRCH_UNF_18";
    const mat = DB.materials[matKey] || DB.materials["MAT_BIRCH_UNF_18"];
    const sideArea = 2 * (depthMm / 1000) * (heightMm / 1000); // 2 sides
    const fbArea = 2 * (widthMm / 1000) * (heightMm / 1000);   // front + back
    const baseArea = (widthMm / 1000) * (depthMm / 1000);       // base
    materialCost = (sideArea + fbArea + baseArea) * mat.costPerM2 * (mat.wasteFactor || 1.12);
  } else {
    materialCost = dt.materialCostPer * (widthMm / 500);
  }
  const labourCost = dt.labourHrs * er();
  const runnerCost = runnerCostOverride !== null ? runnerCostOverride : 40;
  const totalCostPerDrawer = materialCost + labourCost + runnerCost;
  const sellExVAT = totalCostPerDrawer * DB.settings.margin;
  return {
    costPerUnit: totalCostPerDrawer,
    sellPerUnit: sellExVAT,
    totalCost: totalCostPerDrawer * qty,
    totalSellExVAT: sellExVAT * qty,
    totalSellIncVAT: sellExVAT * qty * (1 + DB.settings.vat),
    breakdown: { materialCost, labourCost, runnerCost },
  };
}

function calcCabinetCost({
  widthMm, heightMm, depthMm,
  carcassMaterialKey = "MAT_BIRCH_UNF_18",
  backMaterialKey = "MAT_BACK_HDF_6",
  doorCount = 2, doorType = "SLAB_PNT",
  drawerCount = 0, drawerType = "DRW_BIRCH_PLY",
  runnerKey = "HW_RUN_BLUM_SM",
  hingeKey = "HW_HINGE_SM",
  handleKey = "HW_HDL_BAR128",
  shelfCount = 1,
  frameKey = "FRAME_NONE",
  edgebandKey = "EDGE_OAK_05",
  hasStain = false,
  qty = 1,
}) {
  const mat = DB.materials[carcassMaterialKey];
  const backMat = DB.materials[backMaterialKey] || { costPerM2: 8.50, wasteFactor: 1.10 };
  if (!mat) return null;
  const t = mat.thicknessMm || 18;

  // Panel areas (outer dimensions for ordering, converted to m²)
  const sidesArea   = 2 * (heightMm / 1000) * (depthMm / 1000);
  const topBotArea  = 2 * (widthMm / 1000) * (depthMm / 1000);
  const shelfArea   = shelfCount > 0 ? shelfCount * ((widthMm - 2*t) / 1000) * ((depthMm - 50) / 1000) : 0;
  const mainArea    = (sidesArea + topBotArea + shelfArea) * (mat.wasteFactor || 1.15);
  const backArea    = (widthMm / 1000) * (heightMm / 1000) * (backMat.wasteFactor || 1.10);
  const carcassMaterialCost = mainArea * mat.costPerM2 + backArea * backMat.costPerM2;

  // Assembly labour: scale from DB.settings.carcassBaseHrs for a reference 600×720×560 cabinet
  const refSurfMM2 = 2*(720*560) + 2*(600*560) + 600*720; // 1,910,400 mm²
  const cabSurfMM2 = 2*(heightMm*depthMm) + 2*(widthMm*depthMm) + widthMm*heightMm;
  const scale = Math.sqrt(cabSurfMM2 / refSurfMM2);
  const assemblyHrs = (DB.settings.carcassBaseHrs * scale) + (shelfCount * DB.settings.carcassShelfHrs) + (drawerCount > 0 ? DB.settings.carcassDrawerPrepHrs : 0);
  const carcassLabourCost = assemblyHrs * er();
  const carcassHardware = 8 + shelfCount * 1.50; // cam bolts, shelf pins, etc.

  // Doors (cost only, margin applied to cabinet total)
  let doorsCost = 0;
  if (doorCount > 0 && doorType && DB.doorTypes[doorType]) {
    const doorW = Math.floor(widthMm / doorCount) - 2;
    const doorH = heightMm - 6;
    const hinge = DB.hardware.hinges[hingeKey] || DB.hardware.hinges["HW_HINGE_SM"];
    const handle = DB.hardware.handles[handleKey] || DB.hardware.handles["HW_HDL_BAR128"];
    const hingeCostPerDoor = hingeCount(doorH) * hinge.costEach;
    const dp = calcDoorCost({ doorType, widthMm: doorW, heightMm: doorH, qty: doorCount, hingeCost: hingeCostPerDoor, handleCost: handle.costEach, hasStain });
    doorsCost = dp ? dp.totalCost : 0;
  }

  // Drawers (cost only)
  let drawersCost = 0;
  if (drawerCount > 0 && drawerType && DB.drawerTypes[drawerType]) {
    const runner = DB.hardware.runners[runnerKey] || DB.hardware.runners["HW_RUN_BLUM_SM"];
    const dp = calcDrawerCost({ drawerType, widthMm: widthMm - 26, heightMm: 180, depthMm: depthMm - 50, qty: drawerCount, runnerCostOverride: runner.costPair, carcassMaterialKey });
    drawersCost = dp ? dp.totalCost : 0;
  }

  // ── Drawer fronts (priced like doors when drawers have a painted/finished door type) ──
  let drawerFrontsCost = 0;
  const drawerFrontHeights = [];
  if (drawerCount > 0 && doorType && DB.doorTypes[doorType]) {
    const topRailMm = 32;
    const gapMm = 3;
    const usableHeight = heightMm - topRailMm;
    const totalGaps = gapMm * (drawerCount - 1);
    const availableHeight = usableHeight - totalGaps;
    const defaultFrontH = Math.round(availableHeight / drawerCount);
    for (let i = 0; i < drawerCount; i++) drawerFrontHeights.push(defaultFrontH);
    const frontW = widthMm - 4; // drawer fronts span full cabinet width
    for (const fh of drawerFrontHeights) {
      const dfp = calcDoorCost({ doorType, widthMm: frontW > 0 ? frontW : widthMm - 4, heightMm: fh, qty: 1, hingeCost: 0, handleCost: 0, sprayFinish: true, hasStain });
      if (dfp) drawerFrontsCost += dfp.totalCost;
    }
  }

  // ── Face frame ──────────────────────────────────────────────────────────
  const frameResult = calcCabinetFaceFrameCost({
    frameKey: frameKey || "FRAME_NONE",
    widthMm: widthMm, heightMm: heightMm, qty: 1
  });
  // If frame fitted, override hinge to butt hinge (similar cost bracket to Blum SM)
  const effectiveHingeKey = (frameKey && frameKey !== "FRAME_NONE")
    ? (hingeKey || "HW_HINGE_BUTT")
    : (hingeKey || "HW_HINGE_SM");

  // ── Edgebanding ─────────────────────────────────────────────────────────
  // Skip if: frame is fitted, or material is birch ply
  const needsEdgeband = (frameKey === "FRAME_NONE" || !frameKey)
    && !NO_EDGE_MATERIALS.has(carcassMaterialKey || "MAT_BIRCH_UNF_18");
  const edgebandResult = needsEdgeband ? calcCabinetEdgebandCost({
    edgebandKey: edgebandKey || "EDGE_ABS_PAINT",
    widthMm: widthMm, heightMm: heightMm,
    shelfCount: shelfCount || 0, drawerCount: drawerCount || 0,
    qty: 1
  }) : { costPerUnit: 0, total: 0, totalM: 0 };

  const totalCostPerUnit = carcassMaterialCost + carcassLabourCost + carcassHardware + doorsCost + drawersCost + drawerFrontsCost + frameResult.total + edgebandResult.total;
  const totalCost = totalCostPerUnit * qty;
  const sellExVAT = totalCost * DB.settings.margin;

  return {
    costPerUnit: totalCostPerUnit,
    sellPerUnit: totalCostPerUnit * DB.settings.margin,
    totalCost,
    totalSellExVAT: sellExVAT,
    totalSellIncVAT: sellExVAT * (1 + DB.settings.vat),
    breakdown: { carcassMaterial: carcassMaterialCost, carcassLabour: carcassLabourCost, carcassHardware, doors: doorsCost, drawers: drawersCost, drawerFronts: drawerFrontsCost, frame: frameResult.total, edgeband: edgebandResult.total, assemblyHrs },
  };
}

function calcEndPanelCost({ materialKey, widthMm, heightMm, thicknessMm = 18, faces = 1, exposedEdgeCount = 2, finishType = "paint", hasStain = false, qty = 1 }) {
  const mat = DB.materials[materialKey];
  if (!mat) return null;
  const areaM2  = (widthMm / 1000) * (heightMm / 1000);
  const matCost = areaM2 * mat.costPerM2 * (mat.wasteFactor || 1.12);
  // Labour: cut + sand + edge banding on exposed edges
  const perimM     = 2 * (widthMm + heightMm) / 1000;
  const edgeRateM  = 0.04; // hrs per linear metre of exposed edge
  const labourHrs  = 0.5 + (exposedEdgeCount * (perimM / 4) * edgeRateM);
  const labourCost = labourHrs * er();
  // Spray finish (treat as door — same faces/edges logic, no quirk)
  const spray = calcSprayFinishCost({ doorType: finishType === "lacquer" ? "SLAB_VEN" : "SLAB_PNT",
    widthMm, heightMm, qty: 1, finishType, hasStain, surfaceType: faces >= 2 ? "door" : "panel" });
  const sprayC = spray.costPerDoor;
  const totalCostPerUnit = matCost + labourCost + sprayC;
  const sellExVAT = totalCostPerUnit * DB.settings.margin;
  return {
    costPerUnit: totalCostPerUnit, sellPerUnit: sellExVAT,
    totalCost: totalCostPerUnit * qty, totalSellExVAT: sellExVAT * qty,
    totalSellIncVAT: sellExVAT * qty * (1 + DB.settings.vat),
    breakdown: { material: matCost, labour: labourCost, spray: sprayC },
  };
}

function calcFloatingShelfCost({ materialKey, lengthMm, depthMm, thicknessMm = 18, visibleThicknessMm = 18, faces = 1, finishType = "lacquer", hasStain = false, qty = 1 }) {
  const mat = DB.materials[materialKey];
  if (!mat) return null;
  const topAreaM2   = (lengthMm / 1000) * (depthMm / 1000);
  const isBoxShelf  = visibleThicknessMm > thicknessMm + 4;  // box shelf if apparent thickness significantly greater
  // Box shelf = top face + front return panel (mitred 45°) + optional bottom face
  const frontReturnAreaM2 = isBoxShelf ? (lengthMm / 1000) * (visibleThicknessMm / 1000) : 0;
  const bottomAreaM2      = isBoxShelf ? topAreaM2 : 0;  // hollow box needs bottom too
  const totalAreaM2 = (topAreaM2 + frontReturnAreaM2 + bottomAreaM2) * (mat.wasteFactor || 1.12);
  const matCost     = totalAreaM2 * mat.costPerM2;
  // Labour: cut + sand + assembly (extra for mitre)
  const labourHrs   = 0.5 + (isBoxShelf ? 0.75 : 0);  // 45-min mitre cutting & assembly per box shelf
  const labourCost  = labourHrs * er();
  // Spray finish: 1 or 2 faces — top face always, bottom face if box shelf
  const sprayFaces  = faces >= 2 || isBoxShelf ? "door" : "panel";
  const spray       = calcSprayFinishCost({ doorType: finishType === "paint" ? "SLAB_PNT" : "SLAB_VEN",
    widthMm: depthMm, heightMm: lengthMm, qty: 1, finishType, hasStain, surfaceType: sprayFaces });
  const sprayC = spray.costPerDoor;
  const totalCostPerUnit = matCost + labourCost + sprayC;
  const sellExVAT = totalCostPerUnit * DB.settings.margin;
  return {
    costPerUnit: totalCostPerUnit, sellPerUnit: sellExVAT,
    totalCost: totalCostPerUnit * qty, totalSellExVAT: sellExVAT * qty,
    totalSellIncVAT: sellExVAT * qty * (1 + DB.settings.vat),
    breakdown: { material: matCost, labour: labourCost, spray: sprayC, isBoxShelf },
  };
}

function calcMouldingCost({ mouldingKey, metres, qty = 1 }) {
  const mld = DB.mouldings[mouldingKey];
  if (!mld) return null;
  const wastedM    = metres * 1.10;  // 10% cutting waste
  const matCost    = wastedM * mld.costPerM;
  const labourCost = metres * mld.labourHrsPerM * er();
  const totalCostPerUnit = matCost + labourCost;
  const sellExVAT  = totalCostPerUnit * DB.settings.margin;
  return {
    costPerUnit: totalCostPerUnit, sellPerUnit: sellExVAT,
    totalCost: totalCostPerUnit * qty, totalSellExVAT: sellExVAT * qty,
    totalSellIncVAT: sellExVAT * qty * (1 + DB.settings.vat),
    breakdown: { material: matCost, labour: labourCost },
  };
}

// ─── FACE FRAME COST (CABINET) ─────────────────────────────────────────────────
// Frame runs around the cabinet opening perimeter (2×W + 2×H), 30mm wide.
// Corner joints (pocket screw): add 0.1 hrs per corner (4 corners).
// Changes hinge from Blum cup to butt hinge — handled in priceItem hinge override.
function calcCabinetFaceFrameCost({ frameKey, widthMm, heightMm, qty = 1 }) {
  const fm = FRAME_MATERIALS[frameKey];
  if (!fm || fm.costPerM === 0) return { costPerUnit: 0, total: 0, perimM: 0 };
  const perimM = 2 * (widthMm + heightMm) / 1000;
  const cornerHrs = 4 * 0.10; // 4 corner joints
  const labourHrs = perimM * fm.labourHrsPerM + cornerHrs;
  const matCost   = perimM * fm.costPerM;
  const labourCost = labourHrs * er();
  const costPerUnit = matCost + labourCost;
  return { costPerUnit: +costPerUnit.toFixed(2), total: +(costPerUnit * qty).toFixed(2), perimM: +perimM.toFixed(3), labourHrs: +labourHrs.toFixed(3) };
}

// ─── EDGEBAND COST (CABINET) ───────────────────────────────────────────────────
// Applied to front edges of carcass panels when no face frame and material needs it.
// Edges: 2×height (sides) + 2×width (top+bottom) + width per shelf + width per drawer box.
function calcCabinetEdgebandCost({ edgebandKey, widthMm, heightMm, shelfCount = 0, drawerCount = 0, qty = 1 }) {
  const eb = EDGEBAND_TYPES[edgebandKey];
  if (!eb || eb.costPerM === 0) return { costPerUnit: 0, total: 0, totalM: 0 };
  // Carcass front perimeter + shelves + drawer box front edges
  const carcassM = 2 * (widthMm + heightMm) / 1000;
  const shelvesM = shelfCount * (widthMm / 1000);
  const drawersM = drawerCount * (widthMm / 1000);
  const totalM   = carcassM + shelvesM + drawersM;
  const labourHrs  = totalM * eb.labourHrsPerM;
  const matCost    = totalM * eb.costPerM;
  const labourCost = labourHrs * er();
  const costPerUnit = matCost + labourCost;
  return { costPerUnit: +costPerUnit.toFixed(2), total: +(costPerUnit * qty).toFixed(2), totalM: +totalM.toFixed(3) };
}

function priceItem(item) {
  if (item.type === "cabinet")  return calcCabinetCost({ ...item.params, qty: item.qty });
  if (item.type === "door")     return calcDoorCost({ ...item.params, qty: item.qty });
  if (item.type === "frame")    return calcFrameCost({ ...item.params, qty: item.qty });
  if (item.type === "drawer")   return calcDrawerCost({ ...item.params, qty: item.qty });
  if (item.type === "endpanel") return calcEndPanelCost({ ...item.params, qty: item.qty });
  if (item.type === "shelf")    return calcFloatingShelfCost({ ...item.params, qty: item.qty });
  if (item.type === "moulding") return calcMouldingCost({ ...item.params, qty: item.qty });
  if (item.type === "custom") {
    const cost = (item.params.unitCostExVAT || 0) * item.qty;
    const sell = cost * DB.settings.margin;
    return { costPerUnit: item.params.unitCostExVAT, sellPerUnit: item.params.unitCostExVAT * DB.settings.margin, totalCost: cost, totalSellExVAT: sell, totalSellIncVAT: sell * (1 + DB.settings.vat), breakdown: {} };
  }
  return null;
}

// Ensure every item in a quotes object has pricing calculated.
// Returns a new object so React detects the state change.
function ensurePricing(quotesObj) {
  const result = {};
  for (const [id, q] of Object.entries(quotesObj)) {
    const newRooms = {};
    for (const [roomName, room] of Object.entries(q.rooms || {})) {
      newRooms[roomName] = {
        ...room,
        items: (room.items || []).map(item => {
          if (item.pricing && item.pricing.totalSellExVAT) return item;
          try { return { ...item, pricing: priceItem(item) }; } catch { return item; }
        }),
      };
    }
    result[id] = { ...q, rooms: newRooms };
  }
  return result;
}

async function askAI(userMessage, conversationHistory) {
  const messages = [...conversationHistory, { role: "user", content: userMessage }];
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1500, system: SYSTEM_PROMPT, messages }),
  });
  const data = await response.json();
  const text = data.content?.[0]?.text || "";
  try {
    const clean = text.replace(/```json|```/g, "").trim();
    const parsed = JSON.parse(clean);
    if (Array.isArray(parsed)) return { items: parsed };
    if (parsed.message) return { message: parsed.message };
    return { items: [parsed] };
  } catch { return { message: text }; }
}

// ─── PROJECT COST DEFAULTS ────────────────────────────────────────────────────
function getDefaultProjectCosts() {
  const s = DB.settings;
  return {
    surveyFee:           s.surveyFee,           // £ flat
    installDays:         1,                      // number of install days (user sets per job)
    installDayRate:      s.installDayRate,       // £/day
    deliveryFee:         s.deliveryFee,          // £ flat
    pmPercent:           s.pmPercent,            // % of mfg sell ex VAT
    consumablesPerItem:  s.consumablesPerItem,   // £ per item
    contingencyPercent:  s.contingencyPercent,   // % of subtotal
    warrantyPercent:     s.warrantyPercent,      // % of subtotal
    // toggles
    includeSurvey:       true,
    includeInstall:      false,   // user enables once scope is known
    includeDelivery:     true,
    includePM:           true,
    includeConsumables:  true,
    includeContingency:  false,   // user enables for complex/risky jobs
    includeWarranty:     false,   // user enables as appropriate
  };
}

// ─── QUOTE TOTALS ─────────────────────────────────────────────────────────────
function quoteTotals(quote) {
  let mfgCost = 0, mfgSellExVAT = 0, designFee = 0;
  Object.values(quote.rooms || {}).forEach(room => {
    room.items.forEach(item => {
      mfgCost += item.pricing?.totalCost || 0;
      mfgSellExVAT += item.pricing?.totalSellExVAT || 0;
    });
    if (room.includeDesignTime !== false) designFee += calcDesignTimePerRoom(room);
  });

  // Project-level costs
  const pc = quote.projectCosts || getDefaultProjectCosts();
  const s  = DB.settings;
  const totalItems = Object.values(quote.rooms || {}).reduce((sum, r) => sum + r.items.length, 0);

  const survey      = pc.includeSurvey       ? (pc.surveyFee          ?? s.surveyFee)          * s.margin : 0;
  const install     = pc.includeInstall      ? (pc.installDays        ?? 1) * (pc.installDayRate ?? s.installDayRate) * s.margin : 0;
  const delivery    = pc.includeDelivery     ? (pc.deliveryFee        ?? s.deliveryFee)         * s.margin : 0;
  const pm          = pc.includePM           ? mfgSellExVAT * ((pc.pmPercent         ?? s.pmPercent)        / 100) : 0;
  const consumables = pc.includeConsumables  ? totalItems   * (pc.consumablesPerItem ?? s.consumablesPerItem) : 0;

  const subtotalBeforeContingency = mfgSellExVAT + designFee + survey + install + delivery + pm + consumables;
  const contingency = pc.includeContingency ? subtotalBeforeContingency * ((pc.contingencyPercent ?? s.contingencyPercent) / 100) : 0;
  const subtotalBeforeWarranty    = subtotalBeforeContingency + contingency;
  const warranty    = pc.includeWarranty    ? subtotalBeforeWarranty   * ((pc.warrantyPercent    ?? s.warrantyPercent)    / 100) : 0;

  const totalExVAT = subtotalBeforeWarranty + warranty;
  const vat        = totalExVAT * s.vat;
  return {
    mfgCost, mfgSellExVAT, designFee,
    survey, install, delivery, pm, consumables, contingency, warranty,
    totalExVAT, vat, totalIncVAT: totalExVAT + vat,
    margin: mfgCost > 0 ? mfgSellExVAT / mfgCost : 0,
  };
}


// ─── DISTRIBUTE PROJECT COSTS INTO ITEMS ──────────────────────────────────────
// Spreads all active project costs + design fee proportionally across items
// by their share of manufacturing sell value. Returns an array of rooms with
// baked-in item prices and a services list for display.
function distributeProjectCosts(quote) {
  const t = quoteTotals(quote);
  const overhead = t.designFee + t.survey + t.install + t.delivery + t.pm + t.consumables + t.contingency + t.warranty;
  const rooms = [];
  Object.entries(quote.rooms || {}).forEach(([roomName, room]) => {
    const rDT = room.includeDesignTime !== false ? calcDesignTimePerRoom(room) : 0;
    const bakedItems = room.items.map(item => {
      const itemSell = item.pricing?.totalSellExVAT || 0;
      const share = t.mfgSellExVAT > 0 ? itemSell / t.mfgSellExVAT : 0;
      const itemOverhead = overhead * share;
      // But design fee needs special handling: distribute room design to room items only
      return {
        ...item,
        bakedSellExVAT: itemSell + overhead * share
      };
    });
    rooms.push({ roomName, items: bakedItems });
  });
  // Build services list (active project costs, no values)
  const services = [];
  if (t.designFee > 0) services.push("Design & Drawing Service");
  if (t.survey > 0) services.push("Site Survey");
  if (t.install > 0) services.push("Installation");
  if (t.delivery > 0) services.push("Delivery & Transport");
  if (t.pm > 0) services.push("Project Management");
  if (t.consumables > 0) services.push("Consumables & Fixings");
  if (t.warranty > 0) services.push("Warranty & Aftercare");
  return { rooms, services, totals: t };
}

  const [view, setView] = useState("quotes");
  const [quotes, setQuotes] = useState(() => {
    try {
      const saved = localStorage.getItem('sab_quotes');
      return saved ? ensurePricing(JSON.parse(saved)) : {};
    } catch { return {}; }
  });
  const [dbReady, setDbReady] = useState(false);
  const syncTimerRef = React.useRef(null);

  // Initial sync with server database
  useEffect(() => {
    fetch('/api/health').then(r => r.json()).then(h => {
      if (!h.db) return;
      setDbReady(true);
      return fetch('/api/quotes').then(r => r.json()).then(serverQuotes => {
        setQuotes(prev => {
          const merged = { ...serverQuotes };
          for (const [id, q] of Object.entries(prev)) {
            const local = q.updated_at ? new Date(q.updated_at) : new Date(0);
            const server = merged[id] && merged[id].updated_at ? new Date(merged[id].updated_at) : new Date(0);
            if (!merged[id] || local > server) merged[id] = q;
          }
          return ensurePricing(merged);
        });
      });
    }).catch(() => {});
  }, []);

  // Re-sync when tab becomes visible or comes back online
  useEffect(() => {
    const doSync = () => {
      if (!dbReady) return;
      fetch('/api/quotes/sync', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ quotes })
      }).then(r => r.json()).then(res => {
        if (res.quotes) setQuotes(ensurePricing(res.quotes));
      }).catch(() => {});
    };
    const onVisible = () => { if (document.visibilityState === 'visible') doSync(); };
    const onOnline = () => doSync();
    document.addEventListener('visibilitychange', onVisible);
    window.addEventListener('online', onOnline);

  // Import backup
  const importBackup = (e) => {
    const file = e.target.files?.[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (Array.isArray(data) || typeof data === 'object') { setQuotes(data); alert(`Imported ${Object.keys(data).length} quote(s)`); }
      } catch { alert('Invalid backup file'); }
    };
    reader.readAsText(file);
  };

  const activeQuote = quotes[activeQuoteId];

  // Quote management
  function createQuote() {
    if (!newQuoteForm.client) return;
    const id = `Q${Date.now()}`;
    const q = { id, ...newQuoteForm, ref: newQuoteForm.ref || `SAB-${new Date().getFullYear()}-${String(Object.keys(quotes).length + 1).padStart(3,"0")}`, created: new Date().toLocaleDateString("en-GB"), rooms: {}, projectCosts: getDefaultProjectCosts() };
    saveQuotes({ ...quotes, [id]: q });
    setActiveQuoteId(id); setShowNewQuote(false);
    setNewQuoteForm({ client:"", project:"", ref:"" });
    setView("build");
    setChatHistory([{ role:"assistant", text:`Quote started for **${q.client}** — ${q.project}. Add a room to begin.` }]);
    setAiConvHistory([]); setActiveRoom(null);
  }

  function addRoom() {
    if (!newRoomName || !activeQuoteId) return;
    const updated = { ...quotes };
    updated[activeQuoteId].rooms[newRoomName] = { items: [], includeDesignTime: true, designRounds: DB.settings.designRoundsPerRoom, designHrsPerRound: DB.settings.designHoursPerRound, techDays: DB.settings.technicalDrawingDays, designRate: DB.settings.designHourlyRate, defaults: { ...DEFAULT_ROOM_SETTINGS } };
    saveQuotes(updated); setActiveRoom(newRoomName); setNewRoomName("");
  }

  function duplicateRoom(roomName) {
    if (!activeQuoteId) return;
    const updated = { ...quotes };
    const original = updated[activeQuoteId].rooms[roomName];
    if (!original) return;
    const clone = JSON.parse(JSON.stringify(original));
    let newName = roomName + " (copy)";
    let n = 2;
    while (updated[activeQuoteId].rooms[newName]) { newName = roomName + ` (copy ${n})`; n++; }
    updated[activeQuoteId].rooms[newName] = clone;
    saveQuotes(updated);
    setActiveRoom(newName);
  }

  function deleteRoom(roomName) {
    if (!activeQuoteId) return;
    if (!window.confirm(`Delete room "${roomName}" and all its items?`)) return;
    const updated = { ...quotes };
    delete updated[activeQuoteId].rooms[roomName];
    saveQuotes(updated);
    if (activeRoom === roomName) setActiveRoom(Object.keys(updated[activeQuoteId].rooms)[0] || null);
    setShowRoomSetup(null);
  }

  function removeItem(room, idx) {
    const updated = { ...quotes };
    updated[activeQuoteId].rooms[room].items.splice(idx, 1);
    saveQuotes(updated); setExpandedItem(null);
  }

  function renameRoom(oldName, newName) {
    if (!activeQuoteId || !newName || newName === oldName) return;
    const updated = { ...quotes };
    const rooms = updated[activeQuoteId].rooms;
    if (rooms[newName]) return; // name already taken
    // Preserve insertion order by rebuilding the rooms object
    const newRooms = {};
    Object.entries(rooms).forEach(([k, v]) => {
      newRooms[k === oldName ? newName : k] = v;
    });
    updated[activeQuoteId].rooms = newRooms;
    saveQuotes(updated);
    if (activeRoom === oldName) setActiveRoom(newName);
    if (showRoomSetup === oldName) setShowRoomSetup(newName);
  }

  function duplicateItem(room, idx) {
    const updated = { ...quotes };
    const original = updated[activeQuoteId].rooms[room].items[idx];
    const clone = JSON.parse(JSON.stringify(original));
    updated[activeQuoteId].rooms[room].items.splice(idx + 1, 0, clone);
    saveQuotes(updated);
  }

  function toggleDesignTime(room) {
    const updated = { ...quotes };
    updated[activeQuoteId].rooms[room].includeDesignTime = !(updated[activeQuoteId].rooms[room].includeDesignTime !== false);
    saveQuotes(updated);
  }

  function deleteQuote(id) {
    const updated = { ...quotes }; delete updated[id]; saveQuotes(updated);
    if (activeQuoteId === id) { setActiveQuoteId(null); setView("quotes"); }
    // Also delete from server
    if (dbReady) fetch('/api/quotes/' + id, { method: 'DELETE' }).catch(() => {});
  }

  // Re-price every item in every quote after a DB setting change
  function recalcAllQuotes(currentQuotes) {
    const updated = {};
    Object.entries(currentQuotes).forEach(([qid, quote]) => {
      const updatedRooms = {};
      Object.entries(quote.rooms || {}).forEach(([rname, room]) => {
        updatedRooms[rname] = { ...room, items: room.items.map(item => ({ ...item, pricing: priceItem(item) })) };
      });
      updated[qid] = { ...quote, rooms: updatedRooms };
    });
    return updated;
  }

  function updateRoomDefault(roomName, field, val) {
    setQuotes(prev => {
      const updated = { ...prev };
      const q = { ...updated[activeQuoteId] };
      const rooms = { ...q.rooms };
      const room = { ...rooms[roomName] };
      room.defaults = { ...(room.defaults || DEFAULT_ROOM_SETTINGS), [field]: val };
      // Propagate room default changes to existing items and reprice
      const propagateToItems = (paramKey, newVal) => {
        room.items = room.items.map(item => {
          if (item.params && item.params[paramKey] !== undefined) {
            const upd = { ...item, params: { ...item.params, [paramKey]: newVal } };
            upd.pricing = priceItem(upd);
            return upd;
          }
          return item;
        });
      };
      // Direct param mappings: room default field → item param key
      const directMappings = {
        carcassMaterialKey: "carcassMaterialKey",
        hingeKey: "hingeKey",
        handleKey: "handleKey",
        runnerKey: "runnerKey",
        frameKey: "frameKey",
        edgebandKey: "edgebandKey",
        hasStain: "hasStain",
      };
      if (directMappings[field]) {
        propagateToItems(directMappings[field], val);
      }
      // Door profile/finish changes need to derive the doorType key
      if (field === "doorProfile" || field === "doorFinish") {
        const defs = room.defaults;
        const newDoorType = PROFILE_FINISH_TO_TYPE[`${defs.doorProfile}+${defs.doorFinish}`];
        if (newDoorType) {
          room.items = room.items.map(item => {
            if (item.params && item.params.doorType !== undefined) {
              const upd = { ...item, params: { ...item.params, doorType: newDoorType } };
              upd.pricing = priceItem(upd);
              return upd;
            }
            return item;
          });
        }
      }
      // Drawer type changes
      if (field === "useSolidDrawers" || field === "solidDrawerType") {
        const defs = room.defaults;
        room.items = room.items.map(item => {
          if (item.params && (item.type === "cabinet" || item.type === "drawer")) {
            const newDT = defs.useSolidDrawers ? (defs.solidDrawerType || "DRW_SOLID_OAK") : "DRW_SHEET";
            const upd = { ...item, params: { ...item.params, drawerType: newDT } };
            upd.pricing = priceItem(upd);
            return upd;
          }
          return item;
        });
      }
      rooms[roomName] = room;
      q.rooms = rooms;
      updated[activeQuoteId] = q;
      saveQuotes(updated);
      return updated;
    });
  }

  // Mutate a nested DB value then re-price and save all quotes
  function updateDBSetting(path, val) {
    // path: array of keys, e.g. ['settings','margin'] or ['materials','MAT_BIRCH_UNF_18','costPerM2']
    let obj = DB;
    for (let i = 0; i < path.length - 1; i++) obj = obj[path[i]];
    obj[path[path.length - 1]] = Number(val);
    // Persist all DB settings to localStorage so they survive page reloads
    try { localStorage.setItem('sab_db_settings', JSON.stringify(DB)); } catch {}
    const recalced = recalcAllQuotes(quotes);
    saveQuotes(recalced);
    setSettingsVer(v => v + 1);
  }

  function editItem(room, idx) {
    const item = quotes[activeQuoteId].rooms[room].items[idx];
    if (!item) return;
    // Flatten params back into form shape
    const base = { type: item.type, qty: item.qty, description: item.description };
    const params = item.params || {};
    const pf = params.doorType ? (TYPE_TO_PROFILE_FINISH[params.doorType] || { profile:"slab", finish:"painted" }) : {};
    setAddItemForm({ ...ITEM_DEFAULTS[item.type] || ITEM_DEFAULTS.cabinet, ...base, ...params, doorProfile: pf.profile || "slab", doorFinish: pf.finish || "painted" });
    setEditingItem({ room, idx });
    setShowAddItem(true);
  }

  function updateProjectCost(field, val) {
    const updated = { ...quotes };
    if (!updated[activeQuoteId].projectCosts) updated[activeQuoteId].projectCosts = getDefaultProjectCosts();
    updated[activeQuoteId].projectCosts[field] = val;
    saveQuotes(updated);
  }

  // AI Chat
  async function sendMessage() {
    if (!chatInput.trim() || !activeRoom || !activeQuoteId) return;
    const msg = chatInput.trim(); setChatInput("");
    setChatHistory(h => [...h, { role:"user", text:msg }]); setIsThinking(true);
    const ctx = `Room: ${activeRoom}. ${msg}`;
    const result = await askAI(ctx, aiConvHistory);
    setAiConvHistory(h => [...h, { role:"user", content:ctx }, { role:"assistant", content:JSON.stringify(result) }]);
    if (result.message) {
      setChatHistory(h => [...h, { role:"assistant", text:result.message }]);
    } else if (result.items?.length) {
      const updated = { ...quotes };
      const priced = result.items.map(item => {
        const desc = item.description || item.type;
        const pricing = priceItem(item);
        return { ...item, description: desc, pricing };
      });
      updated[activeQuoteId].rooms[activeRoom].items.push(...priced);
      saveQuotes(updated);
      const summary = priced.map(i => `• ${i.qty > 1 ? `${i.qty}× ` : ""}${i.description} — ${fmt(i.pricing?.totalSellExVAT)} ex VAT`).join("\n");
      setChatHistory(h => [...h, { role:"assistant", text:`Added to **${activeRoom}**:\n${summary}` }]);
    }
    setIsThinking(false);
  }

  // Add item form
  function updateForm(field, val) {
    setAddItemForm(f => {
      let updated = { ...f, [field]: val };
      // When a cabinet type is selected: fill door/drawer/shelf config only — NOT dimensions (bespoke sizes entered manually)
      if (field === "cabinetTypeKey") {
        const ct = DB.cabinetTypes[val];
        if (ct) {
          updated = { ...updated, doorCount: ct.doors, drawerCount: ct.drawers, shelfCount: ct.shelves };
          // Reset dimensions to 0 so user must enter the actual bespoke size
          updated.widthMm = 0; updated.heightMm = 0; updated.depthMm = 0;
        }
      }
      // When door profile or finish changes, derive the doorType key
      if (field === "doorProfile" || field === "doorFinish") {
        const profile = field === "doorProfile" ? val : updated.doorProfile;
        const finish  = field === "doorFinish"  ? val : updated.doorFinish;
        // If chosen finish not valid for this profile, fall back to painted
        const validFinishes = DOOR_PROFILES[profile]?.finishes || ["painted"];
        const safeFinish = validFinishes.includes(finish) ? finish : "painted";
        updated.doorFinish = safeFinish;
        updated.doorType   = PROFILE_FINISH_TO_TYPE[`${profile}+${safeFinish}`] || "SLAB_PNT";
      }
      // Auto-generate description for cabinets
      if (updated.type === "cabinet") {
        const ct = DB.cabinetTypes[updated.cabinetTypeKey];
        const dt = DB.doorTypes[updated.doorType];
        const baseName = ct ? ct.name : "Cabinet";
        const dimStr = (updated.widthMm && updated.heightMm) ? ` ${updated.widthMm}×${updated.heightMm}×${updated.depthMm}mm` : "";
        updated.description = `${baseName}${dimStr} — ${dt?.name || ""}`;
      }
      return updated;
    });
  }

  const formPreview = useMemo(() => {
    try {
      const item = addItemForm.type === "cabinet"
        ? { type:"cabinet", qty: addItemForm.qty, params: addItemForm }
        : addItemForm.type === "door"
        ? { type:"door", qty: addItemForm.qty, params: { doorType: addItemForm.doorType, widthMm: addItemForm.widthMm, heightMm: addItemForm.heightMm, hingeCost: addItemForm.hingeCost, handleCost: addItemForm.handleCost } }
        : addItemForm.type === "frame"
        ? { type:"frame", qty: addItemForm.qty, params: { species: addItemForm.species, widthMm: addItemForm.widthMm, heightMm: addItemForm.heightMm, labourHrs: addItemForm.labourHrs } }
        : addItemForm.type === "drawer"
        ? { type:"drawer", qty: addItemForm.qty, params: { drawerType: addItemForm.drawerType, widthMm: addItemForm.widthMm, heightMm: addItemForm.heightMm, depthMm: addItemForm.depthMm, runnerCostOverride: DB.hardware.runners[addItemForm.runnerKey]?.costPair, carcassMaterialKey: addItemForm.carcassMaterialKey } }
        : { type:"custom", qty: addItemForm.qty, params: { unitCostExVAT: addItemForm.unitCostExVAT, notes: addItemForm.notes } };
      return priceItem(item);
    } catch { return null; }
  }, [addItemForm]);

  function submitAddItem() {
    if (!activeRoom || !activeQuoteId) return;
    const item = addItemForm.type === "cabinet"
      ? { type:"cabinet", description: addItemForm.description || `${addItemForm.widthMm}×${addItemForm.heightMm}×${addItemForm.depthMm} — ${DB.doorTypes[addItemForm.doorType]?.name || ""}${addItemForm.hasStain?" + Stain":""}`, qty: Number(addItemForm.qty), params: addItemForm }
      : addItemForm.type === "door"
      ? { type:"door", description: addItemForm.description || `${DB.doorTypes[addItemForm.doorType]?.name} ${addItemForm.widthMm}×${addItemForm.heightMm}${addItemForm.hasStain?" + Stain":""}`, qty: Number(addItemForm.qty), params: { doorType:addItemForm.doorType, widthMm:+addItemForm.widthMm, heightMm:+addItemForm.heightMm, hasStain:!!addItemForm.hasStain, hingeCost: DB.hardware.hinges[addItemForm.hingeKey]?.costEach * hingeCount(+addItemForm.heightMm) || 0, handleCost: DB.hardware.handles[addItemForm.handleKey]?.costEach || 0 } }
      : addItemForm.type === "frame"
      ? { type:"frame", description: addItemForm.description || `${DB.solidTimber[addItemForm.species]?.name} Frame ${addItemForm.widthMm}w`, qty: Number(addItemForm.qty), params: { species:addItemForm.species, widthMm:+addItemForm.widthMm, heightMm:+addItemForm.heightMm, labourHrs:+addItemForm.labourHrs } }
      : addItemForm.type === "drawer"
      ? { type:"drawer", description: addItemForm.description || `${DB.drawerTypes[addItemForm.drawerType]?.name} ${addItemForm.widthMm}w`, qty: Number(addItemForm.qty), params: { drawerType:addItemForm.drawerType, widthMm:+addItemForm.widthMm, heightMm:+addItemForm.heightMm, depthMm:+addItemForm.depthMm, runnerCostOverride: DB.hardware.runners[addItemForm.runnerKey]?.costPair, carcassMaterialKey: addItemForm.carcassMaterialKey } }
      : addItemForm.type === "endpanel"
      ? { type:"endpanel", description: addItemForm.description || `End Panel ${addItemForm.widthMm}×${addItemForm.heightMm}×${addItemForm.thicknessMm}mm — ${addItemForm.finishType}`, qty: Number(addItemForm.qty), params: { materialKey:addItemForm.materialKey||"MAT_BIRCH_UNF_18", widthMm:+addItemForm.widthMm, heightMm:+addItemForm.heightMm, thicknessMm:+addItemForm.thicknessMm||18, faces:+addItemForm.faces||1, exposedEdgeCount:+addItemForm.exposedEdgeCount||2, finishType:addItemForm.finishType||"paint", hasStain:!!addItemForm.hasStain } }
      : addItemForm.type === "shelf"
      ? { type:"shelf", description: addItemForm.description || `Floating Shelf ${addItemForm.lengthMm}×${addItemForm.depthMm}${(addItemForm.visibleThicknessMm||18)>(addItemForm.thicknessMm||18)+4?" Box":""}mm`, qty: Number(addItemForm.qty), params: { materialKey:addItemForm.materialKey||"MAT_BIRCH_PREF_18", lengthMm:+addItemForm.lengthMm||600, depthMm:+addItemForm.depthMm||300, thicknessMm:+addItemForm.thicknessMm||18, visibleThicknessMm:+addItemForm.visibleThicknessMm||18, faces:+addItemForm.faces||1, finishType:addItemForm.finishType||"lacquer", hasStain:!!addItemForm.hasStain } }
      : addItemForm.type === "moulding"
      ? { type:"moulding", description: addItemForm.description || `${DB.mouldings[addItemForm.mouldingKey]?.name||"Moulding"} — ${addItemForm.metres}m`, qty: Number(addItemForm.qty), params: { mouldingKey:addItemForm.mouldingKey||"MLD_SKR_MDF_95", metres:+addItemForm.metres||3 } }
      : { type:"custom", description: addItemForm.description, qty: Number(addItemForm.qty), params: { unitCostExVAT:+addItemForm.unitCostExVAT, notes:addItemForm.notes } };
    item.pricing = priceItem(item);
    const updated = { ...quotes };
    if (editingItem) {
      // Replace existing item
      updated[activeQuoteId].rooms[editingItem.room].items[editingItem.idx] = item;
    } else {
      updated[activeQuoteId].rooms[activeRoom].items.push(item);
    }
    saveQuotes(updated);
    setShowAddItem(false);
    setEditingItem(null);
    setAddItemForm({ ...ITEM_DEFAULTS.cabinet });
  }

  // ── Shared style tokens ──────────────────────────────────────────────────
  const inp = { background:"#ffffff", border:"1px solid #d8d3cc", borderRadius:3, padding:"7px 10px", color:"#1a1a1a", fontSize:11, fontFamily:"inherit", width:"100%", boxSizing:"border-box" };
  const sel = { ...inp, cursor:"pointer" };
  const lbl = { fontSize:9, letterSpacing:"0.12em", color:"#555555", textTransform:"uppercase", marginBottom:4, display:"block" };
  const row = { marginBottom:10 };

  // ─── RENDER ─────────────────────────────────────────────────────────────────
  return (
    <div style={{ fontFamily:"'Raleway',sans-serif", background:"#f5f5f5", minHeight:"100vh", color:"#1a1a1a" }}>

      {/* ── Header ── */}
      <div className="sab-header" style={{ background:"#1a1a1a", borderBottom:"1px solid #c8a96e33", padding:"0 24px", display:"flex", alignItems:"center", justifyContent:"space-between", height:72 }}>
        <div className="sab-header-brand" style={{ display:"flex", alignItems:"center", gap:16 }}>
          <SABLogo size={52} />
          <div className="sab-brand-divider" style={{ width:1, height:36, background:"#333333" }} />
          <div className="sab-brand-text">
            <div style={{ fontSize:13, letterSpacing:"0.15em", fontWeight:400, color:"#ffffff", textTransform:"uppercase", lineHeight:1.2 }}>Steven Andrews Bespoke</div>
            <div style={{ fontSize:9, color:"#c8a96e", letterSpacing:"0.12em", textTransform:"uppercase" }}>Quote Studio</div>
          </div>
        </div>
        <div className="sab-header-nav" style={{ display:"flex", gap:2, alignItems:"center" }}>
          {activeQuote && (<>
            {[["build","Build"],["margin","Margin"],["client","Client View"]].map(([v,l]) => (
              <button key={v} onClick={() => setView(v)} style={{ padding:"6px 14px", fontSize:11, letterSpacing:"0.08em", textTransform:"uppercase", background:view===v?"#c8a96e":"transparent", color:view===v?"#1a1a1a":"#777777", border:"none", borderRadius:3, cursor:"pointer", fontFamily:"inherit" }}>{l}</button>
            ))}
            <button onClick={() => printQuote(activeQuote)} style={{ padding:"6px 14px", fontSize:11, letterSpacing:"0.08em", background:"transparent", color:"#c8a96e", border:"1px solid #c8c3bc", borderRadius:3, cursor:"pointer", fontFamily:"inherit" }}>↓ PDF</button>
            <button onClick={() => { setView("quotes"); setActiveQuoteId(null); }} style={{ padding:"6px 14px", fontSize:11, background:"transparent", color:"#777777", border:"none", cursor:"pointer", fontFamily:"inherit" }}>← All</button>
            <div style={{ width:1, height:20, background:"#d8d3cc", margin:"0 4px" }} />
          </>)}
          <button onClick={() => setView("settings")} style={{ padding:"6px 14px", fontSize:11, letterSpacing:"0.08em", textTransform:"uppercase", background:view==="settings"?"#c8a96e":"transparent", color:view==="settings"?"#1a1a1a":"#777777", border:"1px solid #d8d3cc", borderRadius:3, cursor:"pointer", fontFamily:"inherit" }}>⚙ Settings</button>
        </div>
      </div>

      {/* ── QUOTES LIST ── */}
      {view === "quotes" && (
        <div className="sab-quotes-list" style={{ maxWidth:820, margin:"0 auto", padding:"40px 24px" }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:32 }}>
            <div>
              <div style={{ fontSize:10, letterSpacing:"0.15em", color:"#c8a96e", textTransform:"uppercase", marginBottom:5 }}>Quote Management</div>
              <div style={{ fontSize:26, color:"#1a1a1a" }}>Active Quotes</div>
            </div>
            <div style={{ display:"flex", gap:8, alignItems:"center" }}>
              <button onClick={() => setShowNewQuote(true)} style={{ padding:"11px 22px", background:"#c8a96e", color:"#1a1a1a", border:"none", borderRadius:4, cursor:"pointer", fontSize:11, letterSpacing:"0.1em", textTransform:"uppercase", fontFamily:"inherit", fontWeight:600 }}>+ New Quote</button>
              <button onClick={exportBackup} style={{ padding:"8px 14px", background:"transparent", color:"#c8a96e", border:"1px solid #c8c3bc", borderRadius:4, cursor:"pointer", fontSize:10, fontFamily:"inherit" }}>↓ Export</button>
              <label style={{ padding:"8px 14px", background:"transparent", color:"#c8a96e", border:"1px solid #c8c3bc", borderRadius:4, cursor:"pointer", fontSize:10, fontFamily:"inherit", display:"inline-block" }}>
                ↑ Import
                <input type="file" accept=".json" onChange={importBackup} style={{ display:"none" }} />
              </label>
            </div>
          </div>
          {showNewQuote && (
            <div style={{ background:"#f0eeeb", border:"1px solid #c8c3bc", borderRadius:8, padding:26, marginBottom:22 }}>
              <div style={{ fontSize:12, letterSpacing:"0.1em", color:"#c8a96e", textTransform:"uppercase", marginBottom:18 }}>New Quote</div>
              {[["Client Name","client"],["Project / Description","project"],["Quote Ref (optional)","ref"]].map(([label,key]) => (
                <div key={key} style={{ marginBottom:12 }}>
                  <div style={lbl}>{label}</div>
                  <input value={newQuoteForm[key]} onChange={e => setNewQuoteForm(f => ({ ...f, [key]:e.target.value }))} onKeyDown={e => e.key==="Enter" && createQuote()} style={{ ...inp, padding:"10px 13px", fontSize:13 }} />
                </div>
              ))}
              <div style={{ display:"flex", gap:10, marginTop:18 }}>
                <button onClick={createQuote} style={{ padding:"10px 22px", background:"#c8a96e", color:"#1a1a1a", border:"none", borderRadius:4, cursor:"pointer", fontSize:11, fontFamily:"inherit", fontWeight:600 }}>Create Quote</button>
                <button onClick={() => setShowNewQuote(false)} style={{ padding:"10px 22px", background:"transparent", color:"#777777", border:"1px solid #c8c3bc", borderRadius:4, cursor:"pointer", fontSize:11, fontFamily:"inherit" }}>Cancel</button>
              </div>
            </div>
          )}
          {Object.values(quotes).length === 0 && !showNewQuote && (
            <div style={{ textAlign:"center", padding:"60px 0", color:"#999999" }}>
              <div style={{ fontSize:36, marginBottom:10 }}>📋</div>
              <div style={{ fontSize:13, letterSpacing:"0.05em" }}>No quotes yet — create your first one</div>
            </div>
          )}
          {Object.values(quotes).map(q => {
            const t = quoteTotals(q);
            const rc = Object.keys(q.rooms||{}).length;
            const ic = Object.values(q.rooms||{}).reduce((s,r) => s+r.items.length, 0);
            return (
              <div key={q.id} onClick={() => { setActiveQuoteId(q.id); setView("build"); setChatHistory([{ role:"assistant", text:`Loaded **${q.client}**. Select a room to continue.` }]); setActiveRoom(Object.keys(q.rooms||{})[0]||null); }}
                style={{ background:"#f0eeeb", border:"1px solid #c8c3bc", borderRadius:8, padding:"18px 22px", marginBottom:10, cursor:"pointer", display:"flex", justifyContent:"space-between", alignItems:"center" }}
                onMouseEnter={e => e.currentTarget.style.borderColor="#c8a96e"}
                onMouseLeave={e => e.currentTarget.style.borderColor="#c8c3bc"}>
                <div>
                  <div style={{ fontSize:16, color:"#1a1a1a", marginBottom:3 }}>{q.client}</div>
                  <div style={{ fontSize:11, color:"#777777" }}>{q.project} · {q.ref} · {q.created}</div>
