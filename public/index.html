              <div style={{ background:"#f0eeeb", borderRadius:8, padding:"20px 22px", marginBottom:24, border:"1px solid #d8d3cc" }}>
                <SectionHead title="Rates & Margin" sub="Changing these recalculates every open quote immediately" />
                <Field label="Direct labour rate" path={["settings","labourRate"]} unit="£/hr" hint="Bench time — direct wages" step={1} />
                <Field label="Overhead absorption rate" path={["settings","overheadRate"]} unit="£/hr" hint="Rent, utilities, insurance, depreciation spread per labour hour" step={1} />
                <Field label="Effective hourly rate" path={[]} readOnly calcVal={`£${effectiveRate}/hr`} hint="Labour + overhead — what one hour of work actually costs" />
                <Field label="Margin multiplier" path={["settings","margin"]} unit="×" hint="Sell price = cost × this figure. 1.75× ≈ 43% gross margin, 2.0× ≈ 50%, 2.25× ≈ 56%" step={0.05} min={1} />
                <Field label="Gross margin" path={[]} readOnly calcVal={`${grossMarginPct}%`} hint="(margin−1) ÷ margin — percentage of sell price that is profit" />
                <Field label="VAT rate" path={["settings","vat"]} unit="decimal" hint="0.20 = 20%. Change if your VAT status changes" step={0.01} />
              </div>

              {/* Carcass Labour */}
              <div style={{ background:"#f0eeeb", borderRadius:8, padding:"20px 22px", marginBottom:24, border:"1px solid #d8d3cc" }}>
                <SectionHead title="Carcass Assembly Labour" sub="Hours to build and assemble the box — scaled by cabinet surface area vs. the 600×720×560 reference" />
                <Field label="Base assembly hours (reference cabinet)" path={["settings","carcassBaseHrs"]} unit="hrs" hint="Hours to make a 600×720×560mm carcass. Scales up/down for larger/smaller cabinets. 2.5hrs = cut, assemble, back panel, edge band." step={0.25} min={0.5} />
                <Field label="Per shelf (additional)" path={["settings","carcassShelfHrs"]} unit="hrs/shelf" hint="Time to drill holes, cut and fit each adjustable shelf" step={0.05} min={0} />
                <Field label="Drawer prep (additional)" path={["settings","carcassDrawerPrepHrs"]} unit="hrs" hint="Extra setup time when a cabinet includes drawers" step={0.25} min={0} />
                {(() => {
                  const hrs = s.carcassBaseHrs + s.carcassShelfHrs; // 1 shelf ref
                  return <Field label="Reference cabinet labour cost (1 shelf)" path={[]} readOnly calcVal={`£${(hrs * effectiveRate).toFixed(0)}`} hint="carcassBaseHrs + 1×shelfHrs — at current effective rate" />;
                })()}
              </div>

              {/* Spray Finishing */}
              <div style={{ background:"#f0eeeb", borderRadius:8, padding:"20px 22px", marginBottom:24, border:"1px solid #d8d3cc" }}>
                <SectionHead title="Spray Finishing" sub="In-house booth — area-based. Paint = primer+topcoats. Lacquer = 2 clear coats. Stain optional pre-treatment. All go through margin." />
                <div style={{ fontSize:11, color:"#888888", marginBottom:14, lineHeight:1.6 }}>
                  Cost is calculated from actual sprayed area: 2 faces + 4 edges for doors (1 face for carcass panels).
                  Shaker/framed doors add caulking time for the quirk groove before priming, plus extra sanding time between coats.
                </div>

                {/* Booth & Tech */}
                <div style={{ fontSize:10, color:"#c8a96e", letterSpacing:"0.08em", marginBottom:4, marginTop:8 }}>BOOTH &amp; TECHNICIAN</div>
                <Field label="Spray tech rate"         path={["settings","sprayFinish","techLabourRate"]}   unit="£/hr"  hint="Spray technician rate — typically lower than bench joiner rate" step={1} />
                <Field label="Booth overhead"          path={["settings","sprayFinish","boothCostPerHr"]}   unit="£/hr"  hint="Electricity, extraction, booth depreciation per hour of use" step={0.5} />
                <Field label="Setup per door"          path={["settings","sprayFinish","setupMinsPerDoor"]} unit="mins"  hint="Hanging, masking, repositioning each door or panel" step={1} min={0} />
                <Field label="Door thickness"          path={["settings","sprayFinish","doorThicknessMm"]}  unit="mm"    hint="Used to calculate edge area — standard MDF/ply door = 19mm" step={1} min={6} />

                {/* Sanding between coats */}
                <div style={{ fontSize:10, color:"#c8a96e", letterSpacing:"0.08em", marginBottom:4, marginTop:14 }}>PREP — SANDING BETWEEN COATS</div>
                <div style={{ fontSize:10, color:"#777777", marginBottom:8 }}>Applied after every coat except the final one. Edges and quirks take the most time.</div>
                <Field label="Face sanding"            path={["settings","sprayFinish","sandFaceHrsPerM2"]} unit="hrs/m²"  hint="Random orbital on flat face between coats" step={0.01} min={0} />
                <Field label="Edge sanding"            path={["settings","sprayFinish","sandEdgeHrsPerM"]}  unit="hrs/m"   hint="Carefully sanding 4 edges between coats — per linear metre" step={0.01} min={0} />
                <Field label="Quirk sanding"           path={["settings","sprayFinish","sandQuirkHrsPerM"]} unit="hrs/m"   hint="Into the shaker groove — hardest access, longest per metre" step={0.01} min={0} />

                {/* Caulking */}
                <div style={{ fontSize:10, color:"#c8a96e", letterSpacing:"0.08em", marginBottom:4, marginTop:14 }}>PREP — QUIRK CAULKING (SHAKER &amp; FRAMED ONLY)</div>
                <div style={{ fontSize:10, color:"#777777", marginBottom:8 }}>Done once before priming. Fill groove → dry → sand flat for a gap-free surface. ~30 min per standard base-unit door.</div>
                <Field label="Caulking time"           path={["settings","sprayFinish","caulkHrsPerM"]}     unit="hrs/m"   hint="Per linear metre of quirk — includes apply, dry, sand. 0.25×2.06m ≈ 31 mins for standard door" step={0.01} min={0} />
                <Field label="Caulk material"          path={["settings","sprayFinish","caulkCostPerM"]}    unit="£/m"     hint="Flexible sealant cost per linear metre of groove" step={0.10} min={0} />

                {/* Paint */}
                <div style={{ fontSize:10, color:"#c8a96e", letterSpacing:"0.08em", marginBottom:4, marginTop:14 }}>PAINT FINISH — OPAQUE (primer + colour topcoats)</div>
                <div style={{ fontSize:10, color:"#777777", marginBottom:8 }}>For: Slab Painted, Shaker Painted, J-Groove, Framed Inset. Primer seals MDF; topcoats give colour and sheen.</div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"0 16px" }}>
                  <div>
                    <div style={{ fontSize:9, color:"#777777", marginBottom:4 }}>PRIMER</div>
                    <Field label="Coats"              path={["settings","sprayFinish","paint","primerCoats"]}           unit="coats"   hint="1 standard; 2 for dark colours or bare MDF" step={1} min={1} />
                    <Field label="Spray — face"       path={["settings","sprayFinish","paint","primerSprayHrsPerM2"]}   unit="hrs/m²"  step={0.01} min={0.01} />
                    <Field label="Spray — edge"       path={["settings","sprayFinish","paint","primerEdgeHrsPerM"]}     unit="hrs/m"   step={0.01} min={0} />
                    <Field label="Spray — quirk"      path={["settings","sprayFinish","paint","primerQuirkHrsPerM"]}    unit="hrs/m"   step={0.01} min={0} />
                    <Field label="Cost"               path={["settings","sprayFinish","paint","primerCostPerLitre"]}    unit="£/litre" step={0.5} />
                    <Field label="Coverage"           path={["settings","sprayFinish","paint","primerCoverageM2PerL"]}  unit="m²/L"    step={0.5} min={1} />
                  </div>
                  <div>
                    <div style={{ fontSize:9, color:"#777777", marginBottom:4 }}>TOP COAT</div>
                    <Field label="Coats"              path={["settings","sprayFinish","paint","topCoats"]}              unit="coats"   hint="2 standard; 1 for budget option; 3 for high-durability" step={1} min={1} />
                    <Field label="Spray — face"       path={["settings","sprayFinish","paint","topCoatSprayHrsPerM2"]}  unit="hrs/m²"  step={0.01} min={0.01} />
                    <Field label="Spray — edge"       path={["settings","sprayFinish","paint","topCoatEdgeHrsPerM"]}    unit="hrs/m"   step={0.01} min={0} />
                    <Field label="Spray — quirk"      path={["settings","sprayFinish","paint","topCoatQuirkHrsPerM"]}   unit="hrs/m"   step={0.01} min={0} />
                    <Field label="Cost"               path={["settings","sprayFinish","paint","topCoatCostPerLitre"]}   unit="£/litre" step={0.5} />
                    <Field label="Coverage"           path={["settings","sprayFinish","paint","topCoatCoverageM2PerL"]} unit="m²/L"    step={0.5} min={1} />
                  </div>
                </div>

                {/* Lacquer */}
                <div style={{ fontSize:10, color:"#c8a96e", letterSpacing:"0.08em", marginBottom:4, marginTop:14 }}>LACQUER FINISH — CLEAR (2 coats, no primer)</div>
                <div style={{ fontSize:10, color:"#777777", marginBottom:8 }}>For: Slab Veneered, Shaker Veneered, Custom Veneer. Clear protective coat — sand between coats.</div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:"0 10px" }}>
                  <Field label="Coats"        path={["settings","sprayFinish","lacquer","coats"]}           unit="coats"   step={1} min={1} />
                  <Field label="Spray — face" path={["settings","sprayFinish","lacquer","sprayHrsPerM2"]}   unit="hrs/m²"  step={0.01} min={0.01} />
                  <Field label="Spray — edge" path={["settings","sprayFinish","lacquer","edgeHrsPerM"]}     unit="hrs/m"   step={0.01} min={0} />
                  <Field label="Spray — quirk"path={["settings","sprayFinish","lacquer","quirkHrsPerM"]}    unit="hrs/m"   step={0.01} min={0} />
                  <Field label="Cost"         path={["settings","sprayFinish","lacquer","costPerLitre"]}    unit="£/litre" step={0.5} />
                  <Field label="Coverage"     path={["settings","sprayFinish","lacquer","coverageM2PerL"]}  unit="m²/L"    step={0.5} min={1} />
                </div>

                {/* Stain */}
                <div style={{ fontSize:10, color:"#c8a96e", letterSpacing:"0.08em", marginBottom:4, marginTop:14 }}>STAIN — OPTIONAL PRE-TREATMENT (before lacquer)</div>
                <div style={{ fontSize:10, color:"#777777", marginBottom:8 }}>Brush or wipe applied. Must dry fully before lacquering. A light sand after stain is included in the inter-coat sanding figure above.</div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:"0 10px" }}>
                  <Field label="Apply — face" path={["settings","sprayFinish","stain","applyHrsPerM2"]}    unit="hrs/m²"  hint="Brush/wipe is slower than spray" step={0.01} min={0} />
                  <Field label="Apply — edge" path={["settings","sprayFinish","stain","edgeHrsPerM"]}      unit="hrs/m"   step={0.01} min={0} />
                  <Field label="Apply — quirk"path={["settings","sprayFinish","stain","quirkHrsPerM"]}     unit="hrs/m"   step={0.01} min={0} />
                  <Field label="Cost"         path={["settings","sprayFinish","stain","costPerLitre"]}     unit="£/litre" step={0.5} />
                  <Field label="Coverage"     path={["settings","sprayFinish","stain","coverageM2PerL"]}   unit="m²/L"    step={0.5} min={1} />
                </div>

                {/* Live example */}
                {(() => {
                  const w = 597, h = 714;
                  const slabPnt  = calcSprayFinishCost({ doorType:"SLAB_PNT",   widthMm:w, heightMm:h, finishType:"paint"   });
                  const shakPnt  = calcSprayFinishCost({ doorType:"SHAKER_PNT", widthMm:w, heightMm:h, finishType:"paint"   });
                  const slabLac  = calcSprayFinishCost({ doorType:"SLAB_VEN",   widthMm:w, heightMm:h, finishType:"lacquer" });
                  const stainLac = calcSprayFinishCost({ doorType:"SLAB_VEN",   widthMm:w, heightMm:h, finishType:"stain_lacquer" });
                  const row = (label, res, note) => (
                    <div style={{ display:"flex", justifyContent:"space-between", padding:"3px 0", borderBottom:"1px solid #f0eeeb" }}>
                      <span>{label}</span>
                      <span style={{ color:"#888888" }}>{note}</span>
                      <span>{res.breakdown.totalHrs.toFixed(2)}hrs</span>
                      <span style={{ color:"#333333" }}>{fmt(res.costPerDoor)} cost</span>
                      <span style={{ color:"#c8a96e" }}>{fmt(res.costPerDoor * s.margin)} sell</span>
                    </div>
                  );
                  return (
                    <div style={{ marginTop:14, padding:"10px 12px", background:"#f0eeeb", borderRadius:6, fontSize:11, color:"#888888", lineHeight:1.8 }}>
                      <div style={{ color:"#c8a96e", fontWeight:600, marginBottom:6 }}>Live example — 597×714mm door (standard 600mm base unit):</div>
                      {row("Slab – Paint",         slabPnt,  "2 faces · 4 edges · primer+2 top")}
                      {row("Shaker – Paint",       shakPnt,  "2 faces · 4 edges · caulk+quirk · primer+2 top")}
                      {row("Slab – Lacquer",       slabLac,  "2 faces · 4 edges · 2 lacquer coats")}
                      {row("Slab – Stain+Lacquer", stainLac, "2 faces · 4 edges · stain · 2 lacquer coats")}
                    </div>
                  );
                })()}
              </div>

              {/* Design Time */}
              <div style={{ background:"#f0eeeb", borderRadius:8, padding:"20px 22px", marginBottom:24, border:"1px solid #d8d3cc" }}>
                <SectionHead title="Design Time" sub="Charged directly to client — no margin applied" />
                <Field label="Design rounds per room" path={["settings","designRoundsPerRoom"]} unit="rounds" hint="Number of client revision cycles" step={1} />
                <Field label="Hours per design round" path={["settings","designHoursPerRound"]} unit="hrs" hint="One full working day = 8hrs" step={1} />
                <Field label="Technical drawing days" path={["settings","technicalDrawingDays"]} unit="days" hint="Workshop drawings, CNC files, specifications" step={1} />
                <Field label="Working hours per day" path={["settings","workingHoursPerDay"]} unit="hrs/day" step={1} />
                <Field label="Design hourly rate" path={["settings","designHourlyRate"]} unit="£/hr" hint="Rate billed to client for design time" step={5} />
                <Field label="Total design fee per room" path={[]} readOnly calcVal={fmt(designTotal)} hint="Auto-calculated from the values above" />
              </div>

              {/* Project Cost Defaults */}
              <div style={{ background:"#f0eeeb", borderRadius:8, padding:"20px 22px", border:"1px solid #d8d3cc" }}>
                <SectionHead title="Project Cost Defaults" sub="Used as starting values for each new quote — override per quote in Build view" />
                <Field label="Site survey fee" path={["settings","surveyFee"]} unit="£ flat" hint="One-off fee for site visit and measure-up" step={25} />
                <Field label="Installation day rate" path={["settings","installDayRate"]} unit="£/day" hint="Fitting and installation labour on site" step={25} />
                <Field label="Delivery fee" path={["settings","deliveryFee"]} unit="£ flat" hint="Van hire / courier to deliver to site" step={25} />
                <Field label="Project management" path={["settings","pmPercent"]} unit="% of mfg sell" hint="Client liaison, ordering, supplier management" step={0.5} />
                <Field label="Consumables per item" path={["settings","consumablesPerItem"]} unit="£/item" hint="Screws, glue, edge tape, abrasives — per cabinet line" step={5} />
                <Field label="Contingency" path={["settings","contingencyPercent"]} unit="% of subtotal" hint="Buffer for access issues, unknowns, late revisions" step={0.5} />
                <Field label="Warranty & aftercare" path={["settings","warrantyPercent"]} unit="% of total" hint="Call-backs and adjustments within warranty period" step={0.5} />
              </div>
            </div>

            {/* ── Col 2 ── */}
            <div>

              {/* Materials */}
              <div style={{ background:"#f0eeeb", borderRadius:8, padding:"20px 22px", marginBottom:24, border:"1px solid #d8d3cc" }}>
                <SectionHead title="Sheet Materials" sub="Cost per m² — update when supplier prices change" />
                {Object.entries(DB.materials).map(([key, mat]) => (
                  <Field key={key} label={mat.name} path={["materials", key, "costPerM2"]} unit="£/m²" step={0.50} />
                ))}
              </div>

              {/* Door Types */}
              <div style={{ background:"#f0eeeb", borderRadius:8, padding:"20px 22px", marginBottom:24, border:"1px solid #d8d3cc" }}>
                <SectionHead title="Door Types — Cost Components" sub="Material costs per m² and base labour hours per door leaf" />
                {Object.entries(DB.doorTypes).map(([key, dt]) => (
                  <div key={key} style={{ marginBottom:14, paddingBottom:12, borderBottom:"1px solid #f0eeeb" }}>
                    <div style={{ fontSize:10, color:"#c8a96e", letterSpacing:"0.08em", marginBottom:6 }}>{dt.name}</div>
                    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8 }}>
                      {[
                        ["Material £/m²", ["doorTypes", key, "baseCostPerM2"], 1],
                        ["Finish £/m²",   ["doorTypes", key, "finishCostPerM2"], 1],
                        ["Base labour hrs",["doorTypes", key, "baseLabourHrs"], 0.25],
                      ].map(([l, path, step]) => {
                        let obj = DB; for (let i = 0; i < path.length - 1; i++) obj = obj[path[i]];
                        const val = obj[path[path.length - 1]];
                        return (
                          <div key={l}>
                            <div style={{ fontSize:9, color:"#999999", marginBottom:3 }}>{l}</div>
                            <input type="number" defaultValue={val} min={0} step={step} key={`${path.join(".")}-${settingsVer}`}
                              onBlur={e => updateDBSetting(path, e.target.value)}
                              style={{ width:"100%", background:"#ffffff", border:"1px solid #d8d3cc", borderRadius:3, padding:"5px 7px", color:"#1a1a1a", fontSize:11, fontFamily:"inherit", boxSizing:"border-box" }} />
                          </div>
                        );
                      })}
                    </div>
                  </div>
                ))}
              </div>

              {/* Hardware */}
              <div style={{ background:"#f0eeeb", borderRadius:8, padding:"20px 22px", marginBottom:24, border:"1px solid #d8d3cc" }}>
                <SectionHead title="Hardware Costs" sub="Update when supplier prices change" />
                <div style={{ fontSize:9, color:"#c8a96e", letterSpacing:"0.1em", textTransform:"uppercase", margin:"10px 0 6px" }}>Hinges</div>
                {Object.entries(DB.hardware.hinges).map(([key, h]) => (
                  <Field key={key} label={h.name} path={["hardware","hinges",key,"costEach"]} unit="£/hinge" step={0.50} />
                ))}
                <div style={{ fontSize:9, color:"#c8a96e", letterSpacing:"0.1em", textTransform:"uppercase", margin:"14px 0 6px" }}>Drawer Runners</div>
                {Object.entries(DB.hardware.runners).map(([key, r]) => (
                  <Field key={key} label={r.name} path={["hardware","runners",key,"costPair"]} unit="£/pair" step={1} />
                ))}
                <div style={{ fontSize:9, color:"#c8a96e", letterSpacing:"0.1em", textTransform:"uppercase", margin:"14px 0 6px" }}>Handles</div>
                {Object.entries(DB.hardware.handles).filter(([k]) => k !== "HW_HDL_NONE").map(([key, h]) => (
                  <Field key={key} label={h.name} path={["hardware","handles",key,"costEach"]} unit="£ each" step={1} />
                ))}
              </div>

              {/* Drawer Types */}
              <div style={{ background:"#f0eeeb", borderRadius:8, padding:"20px 22px", border:"1px solid #d8d3cc" }}>
                <SectionHead title="Drawer Box Costs" sub="Material cost per box and labour hours to make" />
                {Object.entries(DB.drawerTypes).map(([key, dt]) => (
                  <div key={key} style={{ marginBottom:12, paddingBottom:10, borderBottom:"1px solid #f0eeeb" }}>
                    <div style={{ fontSize:10, color:"#c8a96e", marginBottom:6 }}>{dt.name}</div>
                    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
                      {[["Material £/box", ["drawerTypes",key,"materialCostPer"], 5], ["Labour hrs", ["drawerTypes",key,"labourHrs"], 0.5]].map(([l,path,step]) => {
                        let obj = DB; for (let i = 0; i < path.length - 1; i++) obj = obj[path[i]];
                        const val = obj[path[path.length - 1]];
                        return (
                          <div key={l}>
                            <div style={{ fontSize:9, color:"#999999", marginBottom:3 }}>{l}</div>
                            <input type="number" defaultValue={val} min={0} step={step} key={`${path.join(".")}-${settingsVer}`}
                              onBlur={e => updateDBSetting(path, e.target.value)}
                              style={{ width:"100%", background:"#ffffff", border:"1px solid #d8d3cc", borderRadius:3, padding:"5px 7px", color:"#1a1a1a", fontSize:11, fontFamily:"inherit", boxSizing:"border-box" }} />
                          </div>
                        );
                      })}
                    </div>
                  </div>
                ))}
              </div>

            </div>

            <div style={{ gridColumn:"1/-1", background:"#f5f5f5", border:"1px solid #d8d3cc", borderRadius:6, padding:"12px 18px", fontSize:10, color:"#999999", lineHeight:1.8 }}>
              <span style={{ color:"#c8a96e" }}>How pricing works: </span>
              All material and labour costs are summed into a <strong style={{ color:"#777777" }}>total cost</strong>, then multiplied by the <strong style={{ color:"#777777" }}>margin multiplier</strong> to give the <strong style={{ color:"#777777" }}>sell price ex VAT</strong>.
              Design time and project costs (survey, delivery, PM, etc.) are added on top without an additional margin — they are charged at the rate shown.
              Spray finishing is calculated by area (faces × coats, edges, plus quirk perimeter for shaker/framed doors) and is part of manufacturing cost — it <em>does</em> go through the margin.
              Changes on this page take effect instantly across all open quotes.
            </div>
          </div>
        );
      })()}

      <style>{`
        @keyframes pulse { 0%,100%{opacity:.2} 50%{opacity:1} }
        input:focus,select:focus { outline:1px solid #c8a96e !important; border-color:#c8a96e !important; }
        ::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-track{background:#f5f5f5} ::-webkit-scrollbar-thumb{background:#c0bdb8;border-radius:2px}
      `}</style>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<SABQuoteTool />);
  </script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js');}</script>
</body>
</html>
